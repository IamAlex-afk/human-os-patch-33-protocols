name: Weekly sitemap refresh

on:
  schedule:
    - cron: '0 9 * * 1'  # каждый понедельник в 09:00 UTC
  workflow_dispatch:       # можно запустить вручную

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update lastmod in sitemap.xml
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/<lastmod>$TODAY<\/lastmod>/g" sitemap.xml
          echo "Updated lastmod to $TODAY"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet sitemap.xml || (git add sitemap.xml && git commit -m "chore: weekly sitemap lastmod refresh $TODAY")
          git push
