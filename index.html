<script>
const data = {
    en: {
        title: "AI Biohacking: 33 Protocols",
        desc: "A cognitive framework to reverse AI-induced brain fog and restore independent thinking.",
        testTitle: "Cognitive Assessment", solTitle: "The Solution",
        sel: "Select...", btn: "Analyze", share: "Copy Result",
        cta_amz: "Get on Amazon", url_amz: "https://www.amazon.com/dp/B0G35SBQR3",
        q: [
            ["Brain fog after AI use?", ["Always", "Sometimes", "Never"]],
            ["Trust AI for critical logic?", ["Significantly", "Partially", "No"]],
            ["Verify AI output?", ["Always", "Sometimes", "Rarely"]]
        ],
        res: ["High Dependency", "Moderate Usage", "Independent Thinker"]
    },
    ru: {
        title: "Биохакинг с ИИ: 33 Протокола",
        desc: "Когнитивный фреймворк для возврата контроля над мышлением и борьбы с 'ИИ-туманом'.",
        testTitle: "Когнитивный тест", solTitle: "Решение",
        sel: "Выбрать...", btn: "Анализ", share: "Копировать результат",
        cta_amz: "Купить на Amazon", url_amz: "https://www.amazon.com/dp/B0G35SBQR3",
        cta_lit: "Читать на ЛитРес", url_lit: "https://www.litres.ru/book/aleksey-sergeevich-bitk/biohaking-s-ii-33-protokola-perezagruzki-soznaniya-72799232/",
        q: [
            ["Туман после работы с ИИ?", ["Всегда", "Иногда", "Никогда"]],
            ["Доверие ИИ в логике?", ["Полное", "Частичное", "Нет"]],
            ["Проверка ответов ИИ?", ["Всегда", "Иногда", "Редко"]]
        ],
        res: ["Высокая зависимость", "Средний уровень", "Независимое мышление"]
    }
};

let lang = "en";

function render() {
    const d = data[lang];
    document.getElementById("title").innerText = d.title;
    document.getElementById("desc").innerText = d.desc;
    document.getElementById("testTitle").innerText = d.testTitle;
    document.getElementById("solTitle").innerText = d.solTitle;

    let purchase = `<a href="${d.url_amz}" target="_blank" class="btn btn-primary">${d.cta_amz}</a>`;
    if(d.cta_lit) purchase += `<a href="${d.url_lit}" target="_blank" class="btn" style="border-color:var(--dim); color:var(--dim);">${d.cta_lit}</a>`;
    document.getElementById("purchase-links").innerHTML = purchase;

    let html = '';
    d.q.forEach((q, i) => {
        html += `<label style="font-size:0.75rem">${q[0]}</label>
                 <select id="q${i}" class="t-sel"><option value="">${d.sel}</option>
                 ${q[1].map((o, idx) => `<option value="${idx}">${o}</option>`).join('')}</select>`;
    });
    html += `<button id="btn" class="btn" disabled>${d.btn}</button><div id="res" style="margin-top:15px"></div>`;
    document.getElementById("test-area").innerHTML = html;

    document.querySelectorAll(".t-sel").forEach(s => s.onchange = update);
    document.getElementById("btn").onclick = calc;
}

function update() {
    let ok = 0;
    for(let i=0; i<3; i++) if(document.getElementById("q"+i).value !== "") ok++;
    document.getElementById("btn").disabled = ok < 3;
}

function calc() {
    let s = 0;
    for(let i=0; i<3; i++) s += parseInt(document.getElementById("q"+i).value);
    const r = s <= 2 ? 0 : (s <= 4 ? 1 : 2);
    const resTxt = data[lang].res[r];
    document.getElementById("res").innerHTML = `<div style="border-left:2px solid var(--accent); padding-left:10px;">
        <strong>STATUS: ${resTxt}</strong><br>
        <button class="btn" style="font-size:0.7rem; padding:5px; width:auto" onclick="copy('${resTxt}')">${data[lang].share}</button>
    </div>`;
}

window.copy = (txt) => {
    navigator.clipboard.writeText(`AI Dependency Status: ${txt} | Mind-OS`).then(() => alert("Copied!"));
}

["en", "ru"].forEach(l => {
    document.getElementById(l).onclick = () => {
        lang = l;
        document.querySelectorAll(".lang-switcher a").forEach(a => a.classList.remove("active"));
        document.getElementById(l).classList.add("active");
        render();
    };
});

// Optimized Matrix
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
let w, h, cols;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cols = Array(Math.floor(w/20)).fill(0);
}
window.onresize = resize;
resize();

function draw() {
    ctx.fillStyle = "rgba(5, 8, 7, 0.08)";
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#1a3026";
    ctx.font = "14px monospace";
    cols.forEach((y, i) => {
        ctx.fillText(Math.random() > 0.5 ? "1" : "0", i*20, y);
        cols[i] = y > h ? 0 : y + 14;
    });
    requestAnimationFrame(draw);
}
draw();
render();
</script>
