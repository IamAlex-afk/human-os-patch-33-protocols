<style>
:root { --bg:#050807; --accent:#00ff88; --text:#c0d6cc; --border:#1a3026; --dim:#446d56; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono', monospace; display:flex; justify-content:center; padding:20px; line-height: 1.6; overflow-x: hidden; }
canvas { position:fixed; top:0; left:0; z-index:0; opacity:0.1; pointer-events:none; }
.container { position:relative; z-index:1; max-width:800px; width:100%; border:1px solid var(--border); padding:2rem; background:rgba(5, 10, 8, 0.95); box-shadow:0 0 50px #000; }
.top-bar { display:flex; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:1rem; margin-bottom:1.5rem; font-size:0.8rem; color: var(--dim); }
.lang-switcher a { color:var(--dim); margin-left:15px; cursor:pointer; text-decoration:none; transition: 0.3s; }
.lang-switcher a.active, .lang-switcher a:hover { color:var(--accent); }
h1 { font-size:1.8rem; margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:1px; color: #fff; }
.official-tag { color: var(--dim); font-size: 0.85rem; margin-bottom: 1.5rem; border-left: 2px solid var(--accent); padding-left: 15px; }
h2 { color:var(--accent); margin-bottom:1rem; font-size: 1.2rem; text-transform: uppercase; }
.section { border:1px solid var(--border); padding:1.5rem; margin-bottom:1.5rem; background:rgba(0,0,0,0.3); position: relative; }
.btn { display:block; width: 100%; border:1px solid var(--accent); padding:15px; color:var(--accent); text-align:center; text-decoration:none; margin-top:10px; text-transform:uppercase; cursor:pointer; background: transparent; font-family: inherit; transition: 0.3s; }
.btn:disabled { border-color: var(--dim); color: var(--dim); cursor: not-allowed; opacity: 0.5; }
.btn-primary { background: var(--accent) !important; color: #000 !important; font-weight: bold; }
.btn:not(:disabled):hover { background:var(--accent); color:#000; box-shadow: 0 0 15px var(--accent); }
select { width:100%; padding:12px; background:#0a130f; color:var(--text); border:1px solid var(--border); margin:10px 0 20px 0; font-family:inherit; outline: none; }
.profile { border-left:3px solid var(--accent); padding:20px; background:rgba(0,255,136,0.05); margin-top:20px; animation: fadeIn 0.5s ease; }
.trust-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
.trust-link { border: 1px solid var(--border); padding: 6px 12px; font-size: 0.7rem; color: var(--dim); text-decoration: none; transition: 0.2s; }
.trust-link:hover { border-color: var(--accent); color: var(--accent); }
.legal-footer { text-align:center; font-size:0.7rem; color:var(--dim); margin-top:30px; border-top: 1px solid var(--border); padding-top: 20px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

<body>
<canvas id="matrix"></canvas>

<div class="container">

            <a id="en" class="active">EN</a>
            <a id="ru">RU</a>
            <a id="hi">HI</a>
            <a id="es">ES</a>

    </div>

    <h1 id="title">AI Biohacking: 33 Protocols</h1>

        ⚡ Official resource: <strong>“AI Biohacking”</strong> by Aleksei Bitkin
    </div>

    <div class="section">
        <h2 id="testTitle">Cognitive Assessment</h2>
        <p id="hook" style="font-size:0.8rem; color:var(--dim); margin-bottom:15px;">Instant result.</p>
        <div id="test-area"></div>
    </div>

    <div class="section">

    </div>

            <a href="https://medium.com/@starushka.lika/how-i-debugged-my-anxiety-like-a-software-bug-a-programmers-guide-to-rewiring-the-human-os-bcd170e06303" target="_blank" class="trust-link">📰 Medium</a>

        </div>
    </div>

    <div class="legal-footer">

        <p style="margin-top:10px;"><a href="privacy.html" style="color:var(--accent); text-decoration:none;">Privacy Policy</a></p>
    </div>
</div>

<script>
const data = {
    en:{
        sel: "Select...", title:"AI Biohacking",
        desc: "<strong>AI Biohacking: 33 Protocols</strong> — cognitive framework for independent thinking.",
        testTitle: "Cognitive Assessment", hook: "No data stored. Instant result.",
        btn: "Analyze", share: "Share Result",
        cta_amazon: "Get on Amazon", url_amazon: "https://www.amazon.com/dp/B0G35SBQR3",
        q:[
            ["Brain fog after AI use?",["Always","Sometimes","Never"]],
            ["Rely on AI for critical tasks?",["Significantly","Partially","No"]],
            ["Double-check AI answers?",["Always","Sometimes","Rarely"]]
        ],
        res:["High Dependency","Moderate Usage","Independent Thinker"]
    },
    ru:{
        sel: "Выберите...", title:"Биохакинг с ИИ",
        desc: "<strong>Биохакинг с ИИ: 33 протокола</strong> — фреймворк для возврата контроля над мышлением.",
        testTitle: "Когнитивный тест", hook: "Без хранения данных. Мгновенно.",
        btn: "Анализ", share: "Поделиться",
        cta_amazon: "Купить на Amazon", url_amazon: "https://www.amazon.com/dp/B0G35SBQR3",
        cta_litres: "Читать на ЛитРес", url_litres: "https://www.litres.ru/book/aleksey-sergeevich-bitk/biohaking-s-ii-33-protokola-perezagruzki-soznaniya-72799232/",
        q:[
            ["Туман в голове после ИИ?",["Всегда","Иногда","Никогда"]],
            ["Доверяете ИИ важные задачи?",["Значительно","Частично","Нет"]],
            ["Перепроверяете ИИ?",["Всегда","Иногда","Редко"]]
        ],
        res:["Высокая зависимость","Средний уровень","Независимое мышление"]
    }
};

let lang="en";

function render(){
    const d = data[lang] || data.en;
    document.getElementById("title").innerText=d.title;
    document.getElementById("book-description").innerHTML=d.desc;
    document.getElementById("testTitle").innerText=d.testTitle;
    document.getElementById("hook").innerText=d.hook;

    let purchaseHtml = `<a href="${d.url_amazon}" target="_blank" class="btn btn-primary">${d.cta_amazon}</a>`;
    if (d.cta_litres) purchaseHtml += `<a href="${d.url_litres}" target="_blank" class="btn" style="margin-top:5px; border-color:var(--dim); color:var(--dim);">${d.cta_litres}</a>`;
    document.getElementById("purchase-links").innerHTML = purchaseHtml;

    let html = `
        <div style="margin-bottom:15px; font-size:0.7rem; color:var(--dim);">Progress: <span id="p-text">0/3</span></div>
        <div style="height:2px; background:#1a3026; margin-bottom:20px;"><div id="p-bar" style="width:0; height:100%; background:var(--accent); transition:0.3s;"></div></div>
    `;
    d.q.forEach((q,i)=>{
        html+=`<label style="font-size:0.8rem">${q[0]}</label><select id="q${i}" class="test-select"><option value="" selected disabled hidden>${d.sel}</option>`;
        q[1].forEach((opt, idx) => { html+=`<option value="${idx}">${opt}</option>`; });
        html+=`</select>`;
    });
    html+=`<button class="btn" id="calcBtn" disabled>${d.btn}</button><div id="res-area"></div>`;
    document.getElementById("test-area").innerHTML=html;

    document.querySelectorAll('.test-select').forEach(s => s.addEventListener('change', updateUI));
    document.getElementById("calcBtn").addEventListener("click", calculate);
}

function updateUI() {
    let count = 0;
    for(let i=0; i<3; i++) if(document.getElementById(`q${i}`).value !== "") count++;
    document.getElementById("p-bar").style.width = (count/3)*100 + "%";
    document.getElementById("p-text").innerText = `${count}/3`;
    document.getElementById("calcBtn").disabled = count < 3;
}

function calculate(){
    let score=0;
    for(let i=0; i<3; i++) score += parseInt(document.getElementById(`q${i}`).value);
    let r = score <= 2 ? 0 : (score <= 4 ? 1 : 2);
    const resultText = (data[lang] || data.en).res[r];
    
    const resArea = document.getElementById("res-area");
    resArea.innerHTML=`<div class="profile"><strong>DIAGNOSIS: ${resultText}</strong><br><button class="btn btn-share" id="copyBtn">${(data[lang]||data.en).share}</button></div>`;
    
    document.getElementById("copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(`My AI Dependency: ${resultText} | Mind-OS`).then(() => alert("Copied!"));
    });
}

["en","ru"].forEach(l=>{
    document.getElementById(l).onclick=()=>{
        lang=l;
        document.querySelectorAll(".lang-switcher a").forEach(a=>a.classList.remove("active"));
        document.getElementById(l).classList.add("active");
        render();
    };
});

// Matrix Logic with Visibility Check
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
let w, h, cols;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; cols = Array(Math.floor(w/20)).fill(0); }
window.onresize = resize; resize();

function draw() {
    ctx.fillStyle = "rgba(5, 8, 7, 0.1)"; ctx.fillRect(0, 0, w, h);
    ctx.font = "14px monospace"; ctx.fillStyle = "#1a3026";
    cols.forEach((y, i) => { ctx.fillText(Math.random() > 0.5 ? "1" : "0", i*20, y); cols[i] = y > h ? 0 : y + 14; });
}

let timer = setInterval(draw, 70);
document.addEventListener("visibilitychange", () => {
    if(document.hidden) clearInterval(timer);
    else timer = setInterval(draw, 70);
});

render();
</script>
