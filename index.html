      questions3: ["毎日の予定や次に何をするかを決めるのにAIに頼っていますか？","仕事関連のテキストのほとんどをAIで作成または書き直していますか？","問題に行き詰まったら、自分で試す前にAIに頼りますか？","製品の選択（どのノートパソコン、どのレストラン）をAIに任せていますか？","日常的なタスクにAIを使えないと生産性が下がったと感じますか？"],
      suggestions: { low1: "AIを意識的に使い続けてください。素晴らしいです。", low2: "良いバランスです。意識を維持しましょう。", low3: "あなたがコントロールしています。素晴らしい。", medium1: "試してみてください：AIに尋ねる前に30秒間自分で考えてみる。", medium2: "1日1回、実際の人と話してみてください。", medium3: "毎日1つ、AIを使わずに仕事の小さな問題を解決してみてください。", high1: "タイマーをセット：質問する前に5分間、AIなしで考えてみる。", high2: "チャットボットから一日休んで、自分の気持ちを観察してみてください。", high3: "毎朝、AIを使わずに手書きでToDoリストを書いてみてください。" }
    }
  };

  let currentLang = 'en';
  function escapeHtml(str){ return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  function setText(id, text){ const el = document.getElementById(id); if(el) el.textContent = text; }

  function renderProtocols(){
    const grid = document.getElementById('protocolGrid');
    if(!grid) return;
    grid.innerHTML = protocolsData.map(p => `
      <div class="protocol-card">
        <div class="protocol-num">Protocol ${p.num}</div>
        <div class="protocol-title">${escapeHtml(p.title)}</div>
        <div class="protocol-desc">${escapeHtml(p.desc)}</div>
      </div>
    `).join('');
  }

  function buildQuestions(containerId, questionsArray, prefix, progressId){
    const container = document.getElementById(containerId);
    if(!container) return;
    const t = translations[currentLang];
    container.innerHTML = '';
    questionsArray.forEach((q, idx) => {
      const div = document.createElement('div'); div.className = 'question';
      div.innerHTML = `<div class="question-text">${escapeHtml(q)}</div><div class="options">${[ {v:1, l:t.options.never}, {v:2, l:t.options.sometimes}, {v:3, l:t.options.often}, {v:4, l:t.options.always} ].map(opt => `<label class="option-label"><input type="radio" name="${prefix}_${idx}" value="${opt.v}"> ${opt.l}</label>`).join('')}</div>`;
      container.appendChild(div);
    });
    container.querySelectorAll('input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', function(){
        const parent = this.closest('.option-label');
        parent.parentElement.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
        parent.classList.add('selected');
        updateProgress(container, prefix, progressId, questionsArray.length);
      });
    });
    updateProgress(container, prefix, progressId, questionsArray.length);
  }

  function updateProgress(container, prefix, progressId, total){
    let answered = 0;
    for(let i=0; i<total; i++) if(container.querySelector(`input[name="${prefix}_${i}"]:checked`)) answered++;
    const progress = document.getElementById(progressId);
    if(progress) progress.textContent = translations[currentLang].progressText.replace('{answered}', answered).replace('{total}', total);
  }

  function computeScore(prefix, n){
    let sum=0, answered=0;
    for(let i=0; i<n; i++){ const sel = document.querySelector(`input[name="${prefix}_${i}"]:checked`); if(sel){ sum+=parseInt(sel.value); answered++; } }
    return answered===n ? sum : null;
  }

  function showResult(resultId, score, max, testId, t){
    const div = document.getElementById(resultId); if(!div) return;
    const ratio = score/max;
    let levelText = ratio<=0.4 ? t.resultLow : (ratio<=0.7 ? t.resultMedium : t.resultHigh);
    let suggKey = (ratio<=0.4 ? 'low' : (ratio<=0.7 ? 'medium' : 'high')) + testId.slice(-1);
    div.style.display = 'block';
    div.innerHTML = `<strong>${t.resultPrefix} ${score}/${max}</strong><br>${levelText}<div class="suggestion">💡 ${t.suggestions[suggKey]}</div><br><small>${t.resultFooter}</small>`;
  }

  function applyLanguage(lang){
    const t = translations[lang] || translations.en;
    currentLang = lang;
    setText('mainTitle', t.mainTitle); setText('subheadText', t.subhead); setText('infoTitle', t.infoTitle);
    setText('infoPara1', t.infoPara1); setText('infoPara2', t.infoPara2); setText('infoPara3', t.infoPara3);
    setText('infoDisclaimer', t.infoDisclaimer);
    setText('test1Title', t.test1Title); setText('test1Desc', t.test1Desc); setText('test1Hint', t.test1Hint);
    setText('test2Title', t.test2Title); setText('test2Desc', t.test2Desc); setText('test2Hint', t.test2Hint);
    setText('test3Title', t.test3Title); setText('test3Desc', t.test3Desc); setText('test3Hint', t.test3Hint);
    setText('trackerTitle', t.trackerTitle); setText('trackerDesc', t.trackerDesc);
    setText('trackerLowLabel', t.trackerLowLabel); setText('trackerMidLabel', t.trackerMidLabel); setText('trackerHighLabel', t.trackerHighLabel);
    document.getElementById('saveTrackerEntry').textContent = t.saveBtn;
    document.getElementById('resetTrackerData').textContent = t.resetBtn;
    setText('ctaText', t.ctaText); setText('footerText', t.footerText);
    setText('trustNoSignup', t.trustNoSignup); setText('trustLocal', t.trustLocal); setText('trustAnonymous', t.trustAnonymous);
    setText('howTitle', t.howTitle); setText('howText', t.howText);
    setText('protocolsTitle', t.protocolsTitle); setText('protocolsDesc', t.protocolsDesc);
    setText('researchTitle', t.researchTitle); setText('researchPara', t.researchPara);
    setText('faqTitle', t.faqTitle);
    for(let i=1; i<=8; i++){ setText(`faqQ${i}`, t[`faqQ${i}`]); setText(`faqA${i}`, t[`faqA${i}`]); }
    document.getElementById('bookLink').href = t.bookUrl;
    buildQuestions('test1Questions', t.questions1, 'test1', 'test1Progress');
    buildQuestions('test2Questions', t.questions2, 'test2', 'test2Progress');
    buildQuestions('test3Questions', t.questions3, 'test3', 'test3Progress');
    document.querySelectorAll('.btn-submit').forEach(btn => btn.textContent = t.submitBtn);
    ['test1Result','test2Result','test3Result'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; });
    updateTrackerUI();
  }

  function buildLanguageSwitcher(){
    const container = document.getElementById('langBar');
    const langs = ['en','ru','es','de','fr','ja'];
    container.innerHTML = '';
    langs.forEach(code => {
      const btn = document.createElement('button');
      btn.textContent = code.toUpperCase(); btn.className = 'lang-btn' + (currentLang===code?' active':'');
      btn.addEventListener('click', () => { applyLanguage(code); document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); });
      container.appendChild(btn);
    });
  }

  function detectInitialLang(){
    const urlParams = new URLSearchParams(window.location.search);
    const urlLang = urlParams.get('lang');
    if(urlLang && translations[urlLang]) return urlLang;
    const browserLang = navigator.language.split('-')[0];
    if(translations[browserLang]) return browserLang;
    return 'en';
  }

  function getTrackerData(){
    const stored = localStorage.getItem('mindos_tracker_v2');
    return stored ? JSON.parse(stored) : {};
  }

  function saveTrackerData(data){ localStorage.setItem('mindos_tracker_v2', JSON.stringify(data)); }

  function updateTrackerUI(){
    const t = translations[currentLang];
    const data = getTrackerData();
    const today = new Date().toISOString().slice(0,10);
    const last7 = [];
    for(let i=6; i>=0; i--){
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = d.toISOString().slice(0,10);
      last7.push({ date: key, score: data[key] ?? null });
    }
    const validScores = last7.filter(d => d.score !== null).map(d => d.score);
    const avg = validScores.length ? (validScores.reduce((a,b)=>a+b,0)/validScores.length).toFixed(1) : null;
    const container = document.getElementById('trackerStatsArea');
    const chartDiv = document.getElementById('trackerChartContainer');
    const summaryDiv = document.getElementById('trackerSummary');
    let chartHtml = '<div class="tracker-chart">';
    last7.forEach(d => {
      const height = d.score !== null ? (d.score/10)*60 + 10 : 8;
      chartHtml += `<div class="chart-bar"><div class="bar-fill" style="height:${height}px; background: ${d.score!==null?'var(--accent)':'#2a3a30'};"></div><div class="bar-label">${d.date.slice(5)}</div></div>`;
    });
    chartHtml += '</div>';
    chartDiv.innerHTML = chartHtml;
    let trendText = t.noData;
    if(validScores.length >= 3){
      const firstHalf = validScores.slice(0, Math.floor(validScores.length/2));
      const secondHalf = validScores.slice(Math.floor(validScores.length/2));
      const avg1 = firstHalf.reduce((a,b)=>a+b,0)/firstHalf.length;
      const avg2 = secondHalf.reduce((a,b)=>a+b,0)/secondHalf.length;
      if(avg2 > avg1 + 0.8) trendText = t.trendIncreasing;
      else if(avg2 < avg1 - 0.8) trendText = t.trendDecreasing;
      else trendText = t.trendStable;
    }
    summaryDiv.innerHTML = `<strong>${t.trackerSummaryPrefix} ${avg ?? '—'}</strong><br><span class="trend-indicator">${trendText}</span>`;
    document.getElementById('trackerValueDisplay').textContent = data[today] ?? '5';
    document.getElementById('trackerScore').value = data[today] ?? 5;
  }

  function initTracker(){
    const slider = document.getElementById('trackerScore');
    const display = document.getElementById('trackerValueDisplay');
    slider.addEventListener('input', ()=> display.textContent = slider.value);
    document.getElementById('saveTrackerEntry').addEventListener('click', ()=>{
      const today = new Date().toISOString().slice(0,10);
      const data = getTrackerData();
      data[today] = parseInt(slider.value);
      const keys = Object.keys(data).sort().slice(-7);
      const trimmed = {};
      keys.forEach(k => trimmed[k] = data[k]);
      saveTrackerData(trimmed);
      updateTrackerUI();
    });
    document.getElementById('resetTrackerData').addEventListener('click', ()=>{
      localStorage.removeItem('mindos_tracker_v2');
      updateTrackerUI();
    });
    updateTrackerUI();
  }

  function init(){
    renderProtocols();
    const initLang = detectInitialLang();
    applyLanguage(initLang);
    buildLanguageSwitcher();
    document.querySelectorAll('.faq-question').forEach(q => q.addEventListener('click', () => q.classList.toggle('active')));
    function makeSubmitHandler(prefix, n, resultId, max, testId){
      return function(){
        const score = computeScore(prefix, n);
        if(score === null){ alert(translations[currentLang].alertIncomplete); return; }
        showResult(resultId, score, max, testId, translations[currentLang]);
      };
    }
    document.getElementById('submitTest1').addEventListener('click', makeSubmitHandler('test1', 5, 'test1Result', 20, 'test1'));
    document.getElementById('submitTest2').addEventListener('click', makeSubmitHandler('test2', 5, 'test2Result', 20, 'test2'));
    document.getElementById('submitTest3').addEventListener('click', makeSubmitHandler('test3', 5, 'test3Result', 20, 'test3'));
    initTracker();
  }

  window.onload = init;
</script>
</body>
</html>
